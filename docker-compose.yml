version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: truestory-db
    environment:
      POSTGRES_USER: truestory
      POSTGRES_PASSWORD: truestory_secret
      POSTGRES_DB: truestory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truestory -d truestory"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: truestory-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://truestory:truestory_secret@postgres:5432/truestory
      PORT: 3000
      JWT_SECRET: truestory-jwt-secret-change-in-production
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: truestory-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
